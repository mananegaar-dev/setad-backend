
upstream localities {

            server localities:8001;
        }



server {
    listen 80;
    server_name api.setadmahalat.mananegaar.ir;
    client_max_body_size 20M;
    root /app/excel;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Content-Type "text/html; charset=UTF-8";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://localities;
        }
        



    location /media/ {
        alias /media/;
        autoindex off;
    }

    location /static/ {
        alias /app/excel/static/;
    }

    
}



server {

    server_name _;
    return 444;


}
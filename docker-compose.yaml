services:
  # ---------------- localities ----------------
  localities:
    build:
      context: .
      dockerfile: Dockerfile
    image: localities:localities-v1.0.0
    volumes:
      - .:/app # Delte this line If you are in production
      - ./media:/app/media
    container_name: localities
    working_dir: /app
    command: ["bash", "/app/scripts/localities.sh"]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  

    expose:
      - "8001"
    ports:
      - "8001:8001"
    networks:
      - backend


  # ---------------- PostgreSQL ----------------
  db:
    image: postgres:16
    container_name: db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - m-back-end_postgres_data:/var/lib/postgresql/data
      - ./backup:/backup
    restart: unless-stopped
    networks:
      - backend



 

